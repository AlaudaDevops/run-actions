name: AI PR Review

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Repository to review (owner/repo format)"
        required: true
        type: string
      pr_number:
        description: "Pull request number to review"
        required: true
        type: string
      review_style:
        description: "Review style (strict, balanced, lenient)"
        required: false
        default: "strict"
        type: string
      event_payload:
        description: "Pull request event payload"
        required: false
        type: string
      dry_run:
        description: "Dry run mode (output review but don't post comments)"
        required: false
        default: false
        type: boolean

  workflow_call:
    inputs:
      repository:
        description: "Repository to review (owner/repo format)"
        required: true
        type: string
      pr_number:
        description: "Pull request number to review"
        required: true
        type: string
      review_style:
        description: "Review style (strict, balanced, lenient)"
        required: false
        default: "strict"
        type: string
      event_payload:
        description: "Pull request event payload"
        required: false
        type: string
      dry_run:
        description: "Dry run mode (output review but don't post comments)"
        required: false
        default: false
        type: boolean
    secrets:
      TOKEN:
        description: "GitHub token with repo access"
        required: true
      OPENAI_BASEURL:
        description: "Optional base url for API calls with OpenAI models"
        required: false
      OPENAI_TOKEN:
        description: "Optional token for API calls with OpenAI models"
        required: false

env:
  REVIEW_COMMENT_MARKER: "<!-- kilo-pr-review-comment -->"
  SHARED_PROMPT_PATH: ".github/prompts/code-review.md"
  PERSONALIZED_PROMPT_PATH: ".github/prompts/pr-review.md"
  OPENCODE_MODE: "oss" # "codex" "oss" "auto"
  OPENCODE_MODEL: "codex/gpt-5.3-codex"
  OPENCODE_FALLBACK_MODEL: "opencode/minimax-m2.5-free"

jobs:
  review-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout run-actions repo (for shared prompt)
        uses: actions/checkout@v5
        with:
          path: run-actions

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install GitHub CLI
        uses: dev-hanz-ops/install-gh-cli-action@v0.2.1
        with:
          # current latest
          # https://github.com/cli/cli/releases/tag/v2.81.0
          gh-cli-version: 2.81.0

      - name: Auth with GitHub CLI
        run: |
          echo -n "${{ secrets.TOKEN }}" | gh auth login --with-token
          gh auth status
          echo "✅ GitHub CLI authenticated"

      - name: Validate PR exists
        id: validate-pr
        run: |
          REPO="${{ inputs.repository }}"
          PR_NUMBER="${{ inputs.pr_number }}"

          echo "🔍 Validating PR #$PR_NUMBER in $REPO..."

          # Get PR details including head SHA for check status
          PR_DATA=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json number,title,state,headRefName,baseRefName,author,additions,deletions,changedFiles,headRefOid 2>&1) || {
            echo "❌ Failed to fetch PR #$PR_NUMBER from $REPO"
            echo "Error: $PR_DATA"
            exit 1
          }

          echo "$PR_DATA" | jq .

          # Check if PR is open
          PR_STATE=$(echo "$PR_DATA" | jq -r '.state')
          if [ "$PR_STATE" != "OPEN" ]; then
            echo "⚠️ PR #$PR_NUMBER is not open (state: $PR_STATE). Skipping review."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Extract PR info for later use
          echo "pr_title=$(echo "$PR_DATA" | jq -r '.title')" >> $GITHUB_OUTPUT
          echo "pr_author=$(echo "$PR_DATA" | jq -r '.author.login')" >> $GITHUB_OUTPUT
          echo "head_branch=$(echo "$PR_DATA" | jq -r '.headRefName')" >> $GITHUB_OUTPUT
          echo "base_branch=$(echo "$PR_DATA" | jq -r '.baseRefName')" >> $GITHUB_OUTPUT
          echo "additions=$(echo "$PR_DATA" | jq -r '.additions')" >> $GITHUB_OUTPUT
          echo "deletions=$(echo "$PR_DATA" | jq -r '.deletions')" >> $GITHUB_OUTPUT
          echo "changed_files=$(echo "$PR_DATA" | jq -r '.changedFiles')" >> $GITHUB_OUTPUT
          echo "head_sha=$(echo "$PR_DATA" | jq -r '.headRefOid')" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT

          echo "✅ PR validated successfully"

      - name: Set commit status (pending)
        if: steps.validate-pr.outputs.skip != 'true'
        id: create-status
        run: |
          REPO="${{ inputs.repository }}"
          HEAD_SHA="${{ steps.validate-pr.outputs.head_sha }}"
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          echo "📝 Setting commit status to pending for $HEAD_SHA..."

          gh api "repos/$REPO/statuses/$HEAD_SHA" \
            --method POST \
            -f state="pending" \
            -f target_url="$WORKFLOW_URL" \
            -f description="AI Code Review in progress..." \
            -f context="AI Code Review" || {
            echo "⚠️ Failed to set commit status"
          }

          echo "✅ Commit status set to pending"

      - name: Get opencode version
        if: steps.validate-pr.outputs.skip != 'true'
        id: version
        shell: bash
        run: |
          VERSION=$(curl -sf https://api.github.com/repos/anomalyco/opencode/releases/latest | grep -o '"tag_name": *"[^"]*"' | cut -d'"' -f4)
          echo "version=${VERSION:-latest}" >> $GITHUB_OUTPUT

      - name: Cache opencode
        if: steps.validate-pr.outputs.skip != 'true'
        id: cache
        uses: actions/cache@v4
        with:
          path: ~/.opencode/bin
          key: opencode-${{ runner.os }}-${{ runner.arch }}-${{ steps.version.outputs.version }}

      - name: Install opencode
        if: steps.cache.outputs.cache-hit != 'true' && steps.validate-pr.outputs.skip != 'true'
        shell: bash
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Add opencode to PATH
        if: steps.validate-pr.outputs.skip != 'true'
        shell: bash
        run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Clone target repository
        if: steps.validate-pr.outputs.skip != 'true'
        run: |
          REPO="${{ inputs.repository }}"
          HEAD_BRANCH="${{ steps.validate-pr.outputs.head_branch }}"
          PR_NUMBER="${{ inputs.pr_number }}"

          echo "📦 Cloning $REPO (branch: $HEAD_BRANCH)..."
          gh repo clone "$REPO" target-repo
          cd target-repo
          gh pr checkout $PR_NUMBER
          # gh repo clone "$REPO" target-repo -- --branch "$HEAD_BRANCH" --depth 50
          echo "✅ Repository cloned"

      - name: Load shared prompt
        if: steps.validate-pr.outputs.skip != 'true'
        id: shared-prompt
        run: |
          PROMPT_FILE="run-actions/${{ env.SHARED_PROMPT_PATH }}"

          if [ -f "$PROMPT_FILE" ]; then
            echo "✅ Shared prompt loaded from $PROMPT_FILE"
            cat "$PROMPT_FILE" > shared_prompt.md
          else
            echo "⚠️ Shared prompt not found at $PROMPT_FILE, using default"
            exit 1;
          fi

      - name: Load personalized prompt (if exists)
        if: steps.validate-pr.outputs.skip != 'true'
        id: personalized-prompt
        run: |
          PROMPT_FILE="target-repo/${{ env.PERSONALIZED_PROMPT_PATH }}"

          if [ -f "$PROMPT_FILE" ]; then
            echo "✅ Personalized prompt found at $PROMPT_FILE"
            cat "$PROMPT_FILE" > personalized_prompt.md
            echo "has_personalized=true" >> $GITHUB_OUTPUT
          else
            echo "ℹ️ No personalized prompt found at $PROMPT_FILE"
            touch personalized_prompt.md
            echo "has_personalized=false" >> $GITHUB_OUTPUT
          fi

      - name: Prepare review prompt
        if: steps.validate-pr.outputs.skip != 'true'
        run: |
          REPO="${{ inputs.repository }}"
          PR_NUMBER="${{ inputs.pr_number }}"
          PR_TITLE="${{ steps.validate-pr.outputs.pr_title }}"
          PR_AUTHOR="${{ steps.validate-pr.outputs.pr_author }}"
          HEAD_BRANCH="${{ steps.validate-pr.outputs.head_branch }}"
          BASE_BRANCH="${{ steps.validate-pr.outputs.base_branch }}"
          ADDITIONS="${{ steps.validate-pr.outputs.additions }}"
          DELETIONS="${{ steps.validate-pr.outputs.deletions }}"
          CHANGED_FILES="${{ steps.validate-pr.outputs.changed_files }}"
          REVIEW_STYLE="${{ inputs.review_style }}"
          HAS_PERSONALIZED="${{ steps.personalized-prompt.outputs.has_personalized }}"

          cat > review_prompt.md << EOF
          # Pull Request Review Task

          ## PR Information
          - **Repository**: $REPO
          - **PR Number**: #$PR_NUMBER
          - **Title**: $PR_TITLE
          - **Author**: @$PR_AUTHOR
          - **Branch**: $HEAD_BRANCH → $BASE_BRANCH
          - **Changes**: +$ADDITIONS/-$DELETIONS in $CHANGED_FILES files
          - **Review Style**: $REVIEW_STYLE

          ## Shared Review Guidelines

          $(cat shared_prompt.md)

          EOF

          if [ "$HAS_PERSONALIZED" = "true" ]; then
            cat >> review_prompt.md << EOF

          ## Repository-Specific Guidelines

          $(cat personalized_prompt.md)

          EOF
          fi

          cat >> review_prompt.md << 'EOF'

          EOF

          echo "✅ Review prompt prepared ($(wc -l < review_prompt.md) lines)"
          cat review_prompt.md
          echo "----"

      - name: Prepare opencode config
        if: steps.validate-pr.outputs.skip != 'true'
        id: opencode-config
        env:
          OPENAI_BASEURL: ${{ secrets.OPENAI_BASEURL }}
          OPENAI_TOKEN: ${{ secrets.OPENAI_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.config/opencode"
          case "${OPENCODE_MODE}" in
            codex)
              MODEL="${OPENCODE_MODEL}"
              ;;
            oss)
              MODEL="${OPENCODE_FALLBACK_MODEL}"
              ;;
            auto)
              if [ -n "${OPENAI_TOKEN:-}" ]; then
                MODEL="${OPENCODE_MODEL}"
              else
                MODEL="${OPENCODE_FALLBACK_MODEL}"
              fi
              ;;
            *)
              echo "❌ Unsupported OPENCODE_MODE: ${OPENCODE_MODE}"
              exit 1
              ;;
          esac

          if [ -z "${MODEL:-}" ]; then
            echo "❌ No model resolved for OPENCODE_MODE=${OPENCODE_MODE}"
            exit 1
          fi

          if [[ "$MODEL" == openai/* || "$MODEL" == codex/* ]] && [ -z "${OPENAI_TOKEN:-}" ]; then
            echo "❌ OPENAI_TOKEN is required when using model '$MODEL'"
            exit 1
          fi

          cp "run-actions/.github/workflows/opencode.template.json" "$HOME/.config/opencode/opencode.json"
          cat $HOME/.config/opencode/opencode.json
          echo "✅ Wrote $HOME/.config/opencode/opencode.json"
          echo "mode=${OPENCODE_MODE}" >> "$GITHUB_OUTPUT"
          echo "selected_model=${MODEL}" >> "$GITHUB_OUTPUT"

      - name: Run AI review
        if: steps.validate-pr.outputs.skip != 'true'
        id: opencode-review
        working-directory: target-repo
        env:
          OPENAI_BASEURL: ${{ secrets.OPENAI_BASEURL }}
          OPENAI_TOKEN: ${{ secrets.OPENAI_TOKEN }}
        run: |
          set -euo pipefail

          echo "🤖 Starting AI code review..."

          MODEL="${{ steps.opencode-config.outputs.selected_model }}"
          USED_FALLBACK=false

          run_review() {
            local model="$1"

            rm -f pr-overview.md status

            echo "Using model: $model"
            echo "Review this PR according to the guidelines in the system prompt" \
              | opencode run --model "$model" --file ../review_prompt.md \
              | tee ../kilo_output.log
          }

          has_review_outputs() {
            [ -f "pr-overview.md" ] || [ -f "status" ]
          }

          if run_review "$MODEL" && has_review_outputs; then
            :
          elif [ "${OPENCODE_MODE}" = "auto" ] && [ "$MODEL" != "${OPENCODE_FALLBACK_MODEL}" ] && [ -n "${OPENCODE_FALLBACK_MODEL}" ]; then
            echo "⚠️ Primary model failed or produced no outputs. Retrying with fallback model..."
            MODEL="${OPENCODE_FALLBACK_MODEL}"
            USED_FALLBACK=true
            run_review "$MODEL"
          else
            echo "❌ Opencode review failed with model '$MODEL'"
            exit 1
          fi

          PR_STATUS=0
          HAS_OVERVIEW=false
          HAS_STATUS=false

          if [ -f "pr-overview.md" ]; then
            cp pr-overview.md ../review_output.md
            echo "✅ Review output saved to ../review_output.md"
            echo "------------------------"
            cat pr-overview.md
            echo "------------------------"
            HAS_OVERVIEW=true
          else
            echo "❌ No review output found"
            echo "No review output generated" > ../review_output.md
          fi

          if [ -f "status" ]; then
            cp status ../status
            echo "✅ Review output saved to ../status"
            echo "------------------------"
            cat status
            echo "------------------------"
            HAS_STATUS=true
            PR_STATUS="$(cat status)"
          fi


          if [ "$HAS_OVERVIEW" != "true" ] && [ "$HAS_STATUS" != "true" ]; then
            echo "❌ Opencode produced no outputs (overview or status)"
            exit 1
          fi


          echo "✅ Opencode review completed"
          echo "📄 Review output saved ($(wc -l < ../review_output.md) lines)"
          echo "has_overview=$HAS_OVERVIEW" >> $GITHUB_OUTPUT
          echo "has_status=$HAS_STATUS" >> $GITHUB_OUTPUT
          echo "pr_status=$PR_STATUS" >> $GITHUB_OUTPUT
          echo "effective_model=$MODEL" >> "$GITHUB_OUTPUT"
          echo "used_fallback=$USED_FALLBACK" >> "$GITHUB_OUTPUT"

      - name: Post overview comment
        if: steps.validate-pr.outputs.skip != 'true' && inputs.dry_run != true
        run: |
          REPO="${{ inputs.repository }}"
          PR_NUMBER="${{ inputs.pr_number }}"
          MODEL="${{ steps.opencode-review.outputs.effective_model }}"
          REVIEW_STYLE="${{ inputs.review_style }}"
          HAS_PERSONALIZED="${{ steps.personalized-prompt.outputs.has_personalized }}"
          MARKER="${{ env.REVIEW_COMMENT_MARKER }}"
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          echo "📝 Preparing overview comment..."

          # Create formatted review comment
          cat > formatted_review.md << EOF
          $MARKER

          ## 🤖 AI Code Review

          | Property | Value |
          |----------|-------|
          | **Model** | \`$MODEL\` |
          | **Style** | $REVIEW_STYLE |
          | **Personalized Prompt** | $([ "$HAS_PERSONALIZED" = "true" ] && echo "✅ Yes" || echo "❌ No") |
          | **Reviewed at** | $(date -u +"%Y-%m-%d %H:%M:%S UTC") |

          ---

          $(cat review_output.md)

          ---

          <details>
          <summary>ℹ️ About this review</summary>

          This review was automatically generated using the [\`run-actions\`]($WORKFLOW_URL) workflow.

          - **Shared prompt**: [\`${{ env.SHARED_PROMPT_PATH }}\`](https://github.com/alaudadevops/run-actions/blob/main/${{ env.SHARED_PROMPT_PATH }})
          $([ "$HAS_PERSONALIZED" = "true" ] && echo "- **Repository prompt**: \`${{ env.PERSONALIZED_PROMPT_PATH }}\`" || echo "- *No repository-specific prompt configured*")

          </details>
          EOF

          # Find existing comment with marker
          echo "🔍 Looking for existing review comment..."
          COMMENTS=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" --paginate 2>/dev/null || echo "[]")
          COMMENT_ID=$(echo "$COMMENTS" | jq -r ".[] | select(.body | contains(\"$MARKER\")) | .id" | head -1)

          if [ -n "$COMMENT_ID" ] && [ "$COMMENT_ID" != "null" ]; then
            echo "📝 Updating existing comment $COMMENT_ID..."
            gh api "repos/$REPO/issues/comments/$COMMENT_ID" \
              --method PATCH \
              -f body="$(cat formatted_review.md)"
            echo "✅ Comment updated"
          else
            echo "📝 Creating new review comment..."
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file formatted_review.md
            echo "✅ Comment created"
          fi

      - name: Update commit status (completed)
        if: always() && steps.validate-pr.outputs.skip != 'true'
        run: |
          REPO="${{ inputs.repository }}"
          HEAD_SHA="${{ steps.validate-pr.outputs.head_sha }}"
          HAS_STATUS="${{ steps.opencode-review.outputs.has_status }}"
          PR_STATUS="${{ steps.opencode-review.outputs.pr_status }}"

          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          echo "📝 Updating commit status for $HEAD_SHA..."

          # Determine state based on comment count
          if [ -z "$PR_STATUS" ] || [ "$PR_STATUS" = "0" ]; then
            STATE="success"
            DESCRIPTION="No issues found"
          else
            STATE="failure"
            DESCRIPTION="Found $ERROR_COUNT critical issue(s)"
          fi

          # Check if the review step failed
          if [ "${{ steps.opencode-review.outcome }}" = "failure" ]; then
            STATE="error"
            DESCRIPTION="Review process failed"
          fi

          gh api "repos/$REPO/statuses/$HEAD_SHA" \
            --method POST \
            -f state="$STATE" \
            -f target_url="$WORKFLOW_URL" \
            -f description="$DESCRIPTION" \
            -f context="AI Code Review" || {
            echo "⚠️ Failed to update commit status"
          }

          echo "✅ Commit status updated: $STATE - $DESCRIPTION"

      - name: Output review (dry run)
        if: steps.validate-pr.outputs.skip != 'true' && inputs.dry_run == true
        run: |
          echo "🔍 DRY RUN MODE - Review output:"
          echo "================================"
          echo "## Overview:"
          cat review_output.md
          echo ""
          echo "## Inline Comments (JSON):"
          cat review_comments.json | jq .
          echo "================================"
          echo "ℹ️ In non-dry-run mode, this would be posted to the PR"

      - name: Generate step summary
        if: always()
        run: |
          REPO="${{ inputs.repository }}"
          PR_NUMBER="${{ inputs.pr_number }}"
          SKIP="${{ steps.validate-pr.outputs.skip }}"
          DRY_RUN="${{ inputs.dry_run }}"
          COMMENT_COUNT="${{ steps.opencode-review.outputs.comment_count }}"
          MODEL="${{ steps.opencode-review.outputs.effective_model }}"

          REVIEW_STYLE="${{ inputs.review_style }}"

          cat >> $GITHUB_STEP_SUMMARY << EOF
          # AI PR Review Summary

          | Property | Value |
          |----------|-------|
          | **Repository** | [$REPO](https://github.com/$REPO) |
          | **PR** | [#$PR_NUMBER](https://github.com/$REPO/pull/$PR_NUMBER) |
          | **Model** | \`$MODEL\` |
          | **Style** | $REVIEW_STYLE |
          | **Issues Found** | ${COMMENT_COUNT:-0} |
          | **Status** | $([ "$SKIP" = "true" ] && echo "⏭️ Skipped" || echo "✅ Completed") |
          | **Mode** | $([ "$DRY_RUN" = "true" ] && echo "🔍 Dry Run" || echo "📝 Live") |

          EOF

          if [ "$SKIP" != "true" ] && [ -f review_output.md ]; then
            echo "## Review Output" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat review_output.md >> $GITHUB_STEP_SUMMARY
          fi
