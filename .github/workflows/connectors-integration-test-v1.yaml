name: Connectors Integration Test v1

# Runs the BDD integration suite of AlaudaDevops/connectors against a
# GitHub-hosted Kind cluster, using public images only. GitHub Actions
# port of the edge-devops-task Tekton `kind-integration-test/0.3` pipeline.
#
# Versioning is by filename: this is v1. Breaking changes go in a new
# `connectors-integration-test-v2.yaml`; v1 is kept for old release
# branches until an explicit deprecation window closes. Bug fixes within
# v1 edit this file in place and every caller picks them up.
#
# Caller (connectors repo, on pull_request):
#
#   - name: Trigger integration test
#     env: { GH_TOKEN: ${{ secrets.RUN_ACTIONS_TOKEN }} }
#     run: |
#       gh workflow run connectors-integration-test-v1.yaml \
#         --repo AlaudaDevops/run-actions \
#         --field repository="${{ github.repository }}" \
#         --field pr_number="${{ github.event.pull_request.number }}" \
#         --field head_sha="${{ github.event.pull_request.head.sha }}"

on:
  workflow_dispatch:
    inputs:
      # --- required ---
      repository:
        description: "Target repository (owner/repo)"
        required: true
        type: string
      pr_number:
        description: "Pull request number"
        required: true
        type: string
      head_sha:
        description: "PR head SHA to stamp commit status on (optional; resolved via gh pr view if empty)"
        required: false
        type: string
        default: ""

      # --- tunables with sensible defaults, overridable by callers for validation ---
      bdd_tags_extra_exclude:
        description: "Godog tag expression appended to the default `~@pending` exclusion. Typically `~@some-flake && ~@another`. Set to empty string to run every scenario."
        required: false
        type: string
        default: "~@csi-approval-deny-error-file && ~@accesspolicy-controller-filter-project"
      godog_concurrency:
        description: "Godog scenario concurrency"
        required: false
        type: string
        default: "1"
      kind_node_image:
        description: "Kind node image. Override to test other k8s versions."
        required: false
        type: string
        default: "kindest/node:v1.33.1"
      ko_base_image:
        description: "Public base image for ko-built connector binaries. Rewrites .ko.yaml at runtime."
        required: false
        type: string
        default: "gcr.io/distroless/static-debian12:nonroot"
      cert_manager_version:
        description: "Upstream cert-manager tag, e.g. v1.4.0. Must match what the connectors repo expects."
        required: false
        type: string
        default: "v1.4.0"
      timeout_minutes:
        description: "Per-job timeout. Default 120 min is plenty for the full BDD suite; bump for extra-large suites."
        required: false
        type: number
        default: 120

      # --- command overrides. Empty = use built-in default. Set to a
      # shell snippet to replace the corresponding step. Use this to
      # validate a new Makefile target (e.g. `make ci-deploy`) in a
      # connectors PR before promoting it into this workflow's default.
      deploy_command:
        description: "Override the deploy step. CWD is `connectors/`. Empty uses built-in kubectl apply + rollout wait."
        required: false
        type: string
        default: ""
      bdd_command:
        description: "Override the BDD invocation. CWD is `connectors/testing/`. Empty uses built-in two-pass `TAGS=… make test` / `make enable-featureflags test`. `EXCLUDE` env var is pre-set to the computed tag exclusion suffix (starts with ` && `) — reference it as `$EXCLUDE` if you want the same flake/pending filtering."
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      repository:         { required: true,  type: string }
      pr_number:          { required: true,  type: string }
      head_sha:           { required: false, type: string, default: "" }
      bdd_tags_extra_exclude: { required: false, type: string, default: "~@csi-approval-deny-error-file && ~@accesspolicy-controller-filter-project" }
      godog_concurrency:  { required: false, type: string, default: "1" }
      kind_node_image:    { required: false, type: string, default: "kindest/node:v1.33.1" }
      ko_base_image:      { required: false, type: string, default: "gcr.io/distroless/static-debian12:nonroot" }
      cert_manager_version: { required: false, type: string, default: "v1.4.0" }
      timeout_minutes:    { required: false, type: number, default: 120 }
      deploy_command:     { required: false, type: string, default: "" }
      bdd_command:        { required: false, type: string, default: "" }
    secrets:
      TOKEN:
        required: true

permissions:
  contents: read

env:
  STATUS_CONTEXT: "Connectors Integration Test"
  CLUSTER_NAME:   "connectors-ci"

jobs:
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}

    steps:
      - name: Checkout run-actions (self)
        uses: actions/checkout@v4
        with:
          path: run-actions
          # Avoid leaking a credential into git's global config — breaks
          # `go mod`'s git fallback on unrelated public github.com repos.
          persist-credentials: false

      - name: Resolve PR head ref and SHA
        id: pr
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
        run: |
          set -euo pipefail
          REPO="${{ inputs.repository }}"
          PR="${{ inputs.pr_number }}"
          INPUT_SHA="${{ inputs.head_sha }}"

          META=$(gh pr view "$PR" --repo "$REPO" --json headRefName,headRefOid,baseRefName,state)
          HEAD_REF=$(echo "$META" | jq -r '.headRefName')
          HEAD_SHA=$(echo "$META" | jq -r '.headRefOid')
          BASE_REF=$(echo "$META" | jq -r '.baseRefName')
          STATE=$(echo "$META" | jq -r '.state')

          # Caller-pinned SHA wins over live lookup (handles force-push).
          if [ -n "$INPUT_SHA" ]; then
            HEAD_SHA="$INPUT_SHA"
          fi

          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"
          echo "state=$STATE"       >> "$GITHUB_OUTPUT"

          echo "Resolved PR $REPO#$PR — head=$HEAD_REF@$HEAD_SHA base=$BASE_REF state=$STATE"

      - name: Set commit status (pending)
        if: steps.pr.outputs.state == 'OPEN'
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
        run: |
          set -euo pipefail
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh api "repos/${{ inputs.repository }}/statuses/${{ steps.pr.outputs.head_sha }}" \
            --method POST \
            -f state="pending" \
            -f target_url="$WORKFLOW_URL" \
            -f description="Integration test in progress" \
            -f context="$STATUS_CONTEXT"

      - name: Checkout target repo at PR head
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ steps.pr.outputs.head_sha }}
          path: connectors
          token: ${{ secrets.TOKEN }}
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: connectors/go.mod
          # testing/ is its own module with a different AlaudaDevops/bdd
          # pseudo-version pin.
          cache-dependency-path: |
            connectors/go.sum
            connectors/testing/go.sum

      - name: Configure git token for go mod git fallback
        # AlaudaDevops/* pseudo-versions pinned in go.mod aren't always
        # cached on proxy.golang.org, so go-mod falls back to git
        # ls-remote direct. Anonymous git fails on GHA's ubuntu runners
        # ("could not read Username ... terminal prompts disabled") so
        # rewrite https://github.com/ URLs to carry an auth token.
        env:
          TOKEN: ${{ secrets.TOKEN }}
        run: |
          git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Set up ko
        uses: ko-build/setup-ko@v0.8
        with:
          version: v0.17.1

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.33.3

      - name: Override ko base image (public)
        working-directory: connectors
        env:
          KO_BASE_IMAGE: ${{ inputs.ko_base_image }}
        run: |
          # The default .ko.yaml references a private Alauda mirror. Swap
          # in a public base image so the GHA runner can pull it.
          printf 'defaultBaseImage: %s\n' "$KO_BASE_IMAGE" > .ko.yaml
          cat .ko.yaml

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          node_image: ${{ inputs.kind_node_image }}
          kubectl_version: v1.33.3
          wait: 300s

      - name: Show cluster info
        run: kubectl cluster-info && kubectl get nodes -o wide

      - name: Pre-load public nginx as the BDD testdata expected path
        working-directory: connectors
        run: |
          set -euo pipefail
          # The BDD testdata references nginx via a Go template that
          # expands to `<default-registry>/3rdparty/nginx:1.23.2` when
          # no override is provided. Pull the public Docker Hub image,
          # retag under the default path, and load into the kind node so
          # pods with `imagePullPolicy: IfNotPresent` find it locally.
          NGINX_PATH='152-231-registry.alauda.cn:60070/3rdparty/nginx:1.23.2'
          docker pull nginx:1.23.2
          docker tag nginx:1.23.2 "$NGINX_PATH"
          kind load docker-image "$NGINX_PATH" --name "$CLUSTER_NAME"

      - name: Install cert-manager from upstream
        env:
          CERT_MANAGER_VERSION: ${{ inputs.cert_manager_version }}
        run: |
          set -euo pipefail
          # Install cert-manager directly rather than via `make certmanager`:
          # the Makefile's target varies across branches and some versions
          # unconditionally rewrite image refs to private Alauda registries.
          URL="https://github.com/jetstack/cert-manager/releases/download/${CERT_MANAGER_VERSION}/cert-manager.yaml"
          kubectl apply -f "$URL"
          kubectl -n cert-manager rollout status deploy/cert-manager            --timeout=5m
          kubectl -n cert-manager rollout status deploy/cert-manager-webhook    --timeout=5m
          kubectl -n cert-manager rollout status deploy/cert-manager-cainjector --timeout=5m

      - name: Build install manifest (make dist)
        id: build-manifest
        working-directory: connectors
        env:
          TAG_OWNER_SOURCE: ci
          GOMAXPROCS: "4"
        run: |
          set -euo pipefail
          export TAG="$CLUSTER_NAME"
          export KO_DOCKER_REPO=kind.local
          export KIND_CLUSTER_NAME="$CLUSTER_NAME"
          # ko writes cmd/* images to kind.local/... and loads them into
          # the kind node automatically.
          make dist
          echo "--- dist/install.yaml images ---"
          grep -E '^\s*image:' dist/install.yaml | awk '{print $NF}' | sort -u

      - name: Pre-load 3rd-party sidecar images
        working-directory: connectors
        run: |
          set -euo pipefail
          # Any dist/install.yaml image under a private Alauda registry
          # needs a public stand-in loaded into kind, or rollout-wait
          # will hang.
          # Current mapping (k8s CSI sidecars on Alauda's 3rdparty mirror):
          #   */3rdparty/k8scsi/<name>:<upstream-tag>-<sha>
          #     -> registry.k8s.io/sig-storage/<name>:<upstream-tag>
          PRIVATE=$(grep -E '^\s*image:' dist/install.yaml \
            | awk '{print $NF}' \
            | grep -vE '^(kind\.local/|ko://)' \
            | sort -u)
          for ref in $PRIVATE; do
            echo "=== resolving public stand-in for $ref ==="
            case "$ref" in
              *alauda.cn*3rdparty/k8scsi/*)
                name=$(echo "$ref" | sed -E 's|.*/3rdparty/k8scsi/([^:]+):.*|\1|')
                tag=$(echo "$ref"  | sed -E 's|.*:([^:]+)$|\1|' | sed -E 's/-[a-f0-9]+$//')
                public="registry.k8s.io/sig-storage/${name}:${tag}"
                echo "pulling $public -> retag as $ref"
                docker pull "$public"
                docker tag  "$public" "$ref"
                kind load docker-image "$ref" --name "$CLUSTER_NAME"
                ;;
              *)
                echo "WARNING: no public mapping for $ref — rollout may fail"
                ;;
            esac
          done

      - name: Deploy connectors
        id: deploy
        working-directory: connectors
        env:
          DEPLOY_COMMAND: ${{ inputs.deploy_command }}
        run: |
          set -euo pipefail
          if [ -n "$DEPLOY_COMMAND" ]; then
            echo "::notice::Using caller-provided deploy_command override"
            echo "--- deploy_command ---"
            printf '%s\n' "$DEPLOY_COMMAND"
            echo "----------------------"
            bash -euo pipefail -c "$DEPLOY_COMMAND"
            exit 0
          fi

          # Default: inline `make deploy` so we don't re-trigger its
          # `dist` dependency (another ~5 min of ko+kustomize for the
          # same manifest).
          kubectl get ns cpaas-system >/dev/null 2>&1 \
            || kubectl create ns cpaas-system
          if kubectl get crd issuers.cert-manager.io >/dev/null 2>&1; then
            kubectl wait --for=condition=Established \
              crd/certificates.cert-manager.io crd/issuers.cert-manager.io \
              --timeout=120s || true
          fi
          kubectl apply -f dist/install.yaml
          kubectl -n connectors-system rollout status deploy/connectors-api             --timeout=10m
          kubectl -n connectors-system rollout status deploy/connectors-controller-manager --timeout=10m
          kubectl -n connectors-system rollout status deploy/connectors-proxy           --timeout=10m
          kubectl -n connectors-system rollout status ds/connectors-csi                 --timeout=10m

      - name: Show deployed resources (debug)
        if: always()
        run: |
          kubectl -n cpaas-system get pods -o wide || true
          kubectl -n cpaas-system get deploy,ds,svc,ingress || true
          kubectl get crd | grep -E 'connectors|cert-manager' || true

      - name: Run BDD suite
        id: bdd
        if: steps.deploy.outcome == 'success'
        # BDD suite lives in testing/ with its own Makefile — root `make test`
        # runs unit tests.
        working-directory: connectors/testing
        env:
          REPORT: allure
          GODOG_ARGS: "--godog.format=allure --godog.concurrency=${{ inputs.godog_concurrency }}"
          EXTRA_EXCLUDE: ${{ inputs.bdd_tags_extra_exclude }}
          BDD_COMMAND: ${{ inputs.bdd_command }}
        run: |
          set -euo pipefail
          # Glue the suite's ~@pending default to the caller's extra
          # exclusions. Empty string is a valid value — then we only
          # exclude ~@pending.
          if [ -n "$EXTRA_EXCLUDE" ]; then
            EXCLUDE=" && ${EXTRA_EXCLUDE}"
          else
            EXCLUDE=""
          fi
          export EXCLUDE   # visible to bdd_command overrides

          if [ -n "$BDD_COMMAND" ]; then
            echo "::notice::Using caller-provided bdd_command override"
            echo "--- bdd_command (EXCLUDE=\"$EXCLUDE\") ---"
            printf '%s\n' "$BDD_COMMAND"
            echo "-------------------------------------------"
            bash -euo pipefail -c "$BDD_COMMAND"
            exit 0
          fi

          TAGS="~@featureflags && ~@pending${EXCLUDE}" make test
          TAGS="@featureflags && ~@pending${EXCLUDE}"  make enable-featureflags test

      - name: Write job summary
        if: always()
        env:
          PR_REPO: ${{ inputs.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
          BASE_REF: ${{ steps.pr.outputs.base_ref }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          BDD_OUTCOME: ${{ steps.bdd.outcome }}
          KIND_NODE_IMAGE: ${{ inputs.kind_node_image }}
          KO_BASE_IMAGE: ${{ inputs.ko_base_image }}
          CERT_MANAGER_VERSION: ${{ inputs.cert_manager_version }}
          GODOG_CONCURRENCY: ${{ inputs.godog_concurrency }}
          BDD_TAGS_EXTRA_EXCLUDE: ${{ inputs.bdd_tags_extra_exclude }}
          DEPLOY_COMMAND: ${{ inputs.deploy_command }}
          BDD_COMMAND: ${{ inputs.bdd_command }}
        run: |
          set -euo pipefail
          SUMMARY="$GITHUB_STEP_SUMMARY"
          ALLURE_DIR=connectors/testing/allure-results

          # Header + config block.
          cat >> "$SUMMARY" <<EOF
          # Connectors Integration Test

          **PR:** [${PR_REPO}#${PR_NUMBER}](https://github.com/${PR_REPO}/pull/${PR_NUMBER}) — \`${HEAD_REF}\` → \`${BASE_REF}\`
          **Head:** [\`${HEAD_SHA:0:8}\`](https://github.com/${PR_REPO}/commit/${HEAD_SHA})
          **Workflow run:** [${GITHUB_RUN_ID}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})

          ## Phases

          | Phase | Outcome |
          |---|---|
          | Deploy | $( [ "$DEPLOY_OUTCOME" = success ] && echo "✅ success" || echo "❌ $DEPLOY_OUTCOME" ) |
          | BDD    | $( [ "$BDD_OUTCOME"    = success ] && echo "✅ success" || echo "❌ $BDD_OUTCOME" ) |

          ## Configuration

          | Input | Value |
          |---|---|
          | Kind node image | \`${KIND_NODE_IMAGE}\` |
          | ko base image | \`${KO_BASE_IMAGE}\` |
          | cert-manager version | \`${CERT_MANAGER_VERSION}\` |
          | Godog concurrency | \`${GODOG_CONCURRENCY}\` |
          | Extra tag exclusions | \`${BDD_TAGS_EXTRA_EXCLUDE:-(none)}\` |
          | Deploy command | $( [ -n "$DEPLOY_COMMAND" ] && echo "⚙️ override" || echo "default" ) |
          | BDD command | $( [ -n "$BDD_COMMAND" ] && echo "⚙️ override" || echo "default" ) |
          EOF

          # If any command was overridden, include the override body in a
          # collapsible block so the run log is self-documenting.
          if [ -n "$DEPLOY_COMMAND" ] || [ -n "$BDD_COMMAND" ]; then
            {
              echo ""
              echo "### Command overrides"
              if [ -n "$DEPLOY_COMMAND" ]; then
                echo ""
                echo "<details><summary>deploy_command</summary>"
                echo ""
                echo '```bash'
                printf '%s\n' "$DEPLOY_COMMAND"
                echo '```'
                echo ""
                echo "</details>"
              fi
              if [ -n "$BDD_COMMAND" ]; then
                echo ""
                echo "<details><summary>bdd_command</summary>"
                echo ""
                echo '```bash'
                printf '%s\n' "$BDD_COMMAND"
                echo '```'
                echo ""
                echo "</details>"
              fi
            } >> "$SUMMARY"
          fi

          # If the allure dir is absent or empty, we likely failed before
          # any BDD scenario ran — show that and skip result aggregation.
          if [ ! -d "$ALLURE_DIR" ] || [ -z "$(ls -A "$ALLURE_DIR" 2>/dev/null)" ]; then
            {
              echo ""
              echo "## Results"
              echo ""
              echo "_No allure results — BDD suite did not produce output._"
            } >> "$SUMMARY"
            exit 0
          fi

          # Aggregate per-status counts + failed-scenario details.
          STATS=$(jq -s '
            map({
              name, status,
              file: (.description // ""),
              msg: (.statusDetails.message // ""),
              failed_step: ([.steps[]? | select(.status == "failed") | .name] | first // ""),
              failed_step_msg: ([.steps[]? | select(.status == "failed") | .statusDetails.message // ""] | first // "")
            })
            | {
              total: length,
              passed:  (map(select(.status == "passed"))  | length),
              failed:  (map(select(.status == "failed"))  | length),
              broken:  (map(select(.status == "broken"))  | length),
              skipped: (map(select(.status == "skipped")) | length),
              unknown: (map(select(.status | IN("passed","failed","broken","skipped") | not)) | length),
              failures: (map(select(.status == "failed" or .status == "broken")))
            }
          ' "$ALLURE_DIR"/*-result.json)

          TOTAL=$(echo "$STATS"   | jq -r .total)
          PASSED=$(echo "$STATS"  | jq -r .passed)
          FAILED=$(echo "$STATS"  | jq -r .failed)
          BROKEN=$(echo "$STATS"  | jq -r .broken)
          SKIPPED=$(echo "$STATS" | jq -r .skipped)
          UNKNOWN=$(echo "$STATS" | jq -r .unknown)

          OVERALL="✅ all scenarios passed"
          if [ "$FAILED" -gt 0 ] || [ "$BROKEN" -gt 0 ]; then
            OVERALL="❌ $((FAILED + BROKEN)) scenario(s) failed"
          fi

          cat >> "$SUMMARY" <<EOF

          ## Results

          **${OVERALL}** · total ${TOTAL}

          | ✅ passed | ❌ failed | 💥 broken | ⏭️ skipped | ❓ unknown |
          |---|---|---|---|---|
          | ${PASSED} | ${FAILED} | ${BROKEN} | ${SKIPPED} | ${UNKNOWN} |
          EOF

          # Failed scenarios detail.
          if [ "$FAILED" -gt 0 ] || [ "$BROKEN" -gt 0 ]; then
            {
              echo ""
              echo "## Failed scenarios"
              echo ""
              echo "$STATS" | jq -r '
                .failures[]
                | "<details><summary><strong>" + .name + "</strong> <code>" + .status + "</code></summary>\n\n"
                  + "- **Feature:** `" + .file + "`\n"
                  + (if .failed_step != "" then "- **Failed step:** `" + .failed_step + "`\n" else "" end)
                  + "\n**Error**\n\n```\n"
                  + (if .failed_step_msg != "" then .failed_step_msg else .msg end)
                  + "\n```\n\n</details>\n"
              '
              echo ""
              echo "Full allure-results uploaded as artifact \`allure-results-${HEAD_SHA}\`."
            } >> "$SUMMARY"
          fi

          echo ""                                               >> "$SUMMARY"
          echo "---"                                            >> "$SUMMARY"
          echo "_GHA port of edge-devops-task's kind-integration-test/0.3 pipeline. Workflow: \`connectors-integration-test-v1.yaml\`._" >> "$SUMMARY"

      - name: Upload allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ steps.pr.outputs.head_sha }}
          path: |
            connectors/testing/allure-results/
          if-no-files-found: ignore

      - name: Collect cluster diagnostics on failure
        if: failure()
        run: |
          set +e
          mkdir -p /tmp/diag
          kubectl cluster-info dump --all-namespaces --output-directory=/tmp/diag > /dev/null
          kubectl -n cpaas-system         describe pods   > /tmp/diag/cpaas-pods-describe.txt
          kubectl -n connectors-system    describe pods   > /tmp/diag/connectors-pods-describe.txt
          kubectl get events -A --sort-by=.lastTimestamp  > /tmp/diag/events.txt

      - name: Upload diagnostics artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cluster-diagnostics-${{ steps.pr.outputs.head_sha }}
          path: /tmp/diag/
          if-no-files-found: ignore

      - name: Update commit status (final)
        if: always() && steps.pr.outputs.state == 'OPEN'
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
        run: |
          set -euo pipefail
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          DEPLOY="${{ steps.deploy.outcome }}"
          BDD="${{ steps.bdd.outcome }}"
          STATE="success"
          DESC="Integration tests passed"

          if [ "$BDD" = "failure" ]; then
            STATE="failure"
            DESC="BDD tests failed"
          elif [ "$DEPLOY" != "success" ]; then
            STATE="error"
            DESC="Integration test setup failed (deploy=$DEPLOY)"
          elif [ "$BDD" = "cancelled" ] || [ "$DEPLOY" = "cancelled" ]; then
            STATE="error"
            DESC="Integration tests cancelled"
          fi

          gh api "repos/${{ inputs.repository }}/statuses/${{ steps.pr.outputs.head_sha }}" \
            --method POST \
            -f state="$STATE" \
            -f target_url="$WORKFLOW_URL" \
            -f description="$DESC" \
            -f context="$STATUS_CONTEXT"
